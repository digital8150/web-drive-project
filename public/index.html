<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiteDrive - Modern File Explorer</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --sidebar-bg: #1e293b;
            --sidebar-text: #f1f5f9;
            --sidebar-active: #334155;
            --bg-color: #f8fafc;
            --surface-color: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --sidebar-width: 260px;
            --header-height: 64px;
            --grid-size: 180px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        aside {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            color: var(--sidebar-text);
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            flex-shrink: 0;
            z-index: 100;
            transition: transform 0.3s ease, margin-left 0.3s ease;
        }

        body.sidebar-collapsed aside {
            margin-left: calc(-1 * var(--sidebar-width));
        }

        /* Sidebar Overlay for Mobile */
        #sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 90;
            backdrop-filter: blur(2px);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 40px;
            padding-left: 8px;
            color: #fff;
            text-decoration: none;
        }

        .nav-group {
            margin-bottom: 32px;
        }

        .nav-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 8px;
            padding-left: 12px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            color: #cbd5e1;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            font-size: 0.9375rem;
            margin-bottom: 4px;
        }

        .nav-item:hover {
            background-color: var(--sidebar-active);
            color: #fff;
        }

        .nav-item.active {
            background-color: var(--primary);
            color: #fff;
        }

        /* Main Content */
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            width: 100%;
        }

        header {
            height: var(--header-height);
            background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            flex-shrink: 0;
            gap: 16px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-grow: 1;
        }

        #menu-toggle {
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        #menu-toggle:hover {
            background-color: #f1f5f9;
        }

        .search-box {
            position: relative;
            max-width: 400px;
            width: 100%;
        }

        .search-box input {
            width: 100%;
            padding: 8px 12px 8px 36px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: #f1f5f9;
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box input:focus {
            border-color: var(--primary);
            background-color: #fff;
        }

        .search-box .icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 18px;
            height: 18px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .zoom-slider-container {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 12px;
            border-right: 1px solid var(--border-color);
            margin-right: 4px;
        }

        .zoom-slider-container i {
            color: var(--text-muted);
        }

        input[type="range"] {
            width: 80px;
            cursor: pointer;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--border-color);
            background-color: var(--surface-color);
            color: var(--text-main);
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-primary {
            background-color: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .view-toggle {
            display: flex;
            background-color: #f1f5f9;
            padding: 4px;
            border-radius: 8px;
        }

        .toggle-btn {
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
        }

        .toggle-btn.active {
            background-color: #fff;
            box-shadow: var(--shadow-sm);
            color: var(--primary);
        }

        /* Content Area */
        #content {
            flex-grow: 1;
            padding: 24px;
            overflow-y: auto;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            font-size: 0.875rem;
            color: var(--text-muted);
            flex-wrap: wrap;
        }

        .breadcrumb span {
            cursor: pointer;
            transition: color 0.2s;
        }

        .breadcrumb span:hover {
            color: var(--primary);
        }

        /* List View */
        .list-view table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background-color: var(--surface-color);
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .list-view th {
            padding: 12px 16px;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            background-color: #fafafa;
            border-bottom: 1px solid var(--border-color);
        }

        .list-view td {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.875rem;
        }

        .list-view tr:last-child td {
            border-bottom: none;
        }

        .list-view tr:hover {
            background-color: #f8fafc;
        }

        /* Grid View */
        .grid-view {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(var(--grid-size), 1fr));
            gap: 20px;
        }

        .grid-item {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .grid-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
            border-color: var(--primary);
        }

        .grid-item .file-icon {
            width: 100%;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f1f5f9;
            border-radius: 8px;
            color: var(--primary);
            overflow: hidden;
        }

        .grid-item .file-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .grid-item .file-icon i {
            width: 48px;
            height: 48px;
        }

        .grid-item .file-name {
            font-size: 0.875rem;
            font-weight: 500;
            text-align: center;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .grid-item .file-info {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Modals & Previews */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background-color: rgba(15, 23, 42, 0.9);
            z-index: 200;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            position: absolute;
            inset: 40px;
            display: flex;
            flex-direction: row;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.5);
        }

        .preview-main {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #000;
        }

        .preview-sidebar {
            width: 300px;
            background: #fff;
            display: flex;
            flex-direction: column;
            padding: 24px;
            border-left: 1px solid var(--border-color);
            color: var(--text-main);
        }

        .sidebar-header {
            margin-bottom: 24px;
        }

        .sidebar-header h3 {
            font-size: 1.1rem;
            word-break: break-all;
            margin-bottom: 8px;
        }

        .sidebar-header p {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .action-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .action-group .btn {
            width: 100%;
            justify-content: center;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            padding: 8px;
            border-radius: 50%;
            z-index: 210;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 900px) {
            .modal-content {
                flex-direction: column;
                inset: 10px;
            }
            .preview-sidebar {
                width: 100%;
                height: auto;
                max-height: 40%;
                overflow-y: auto;
            }
        }

        /* Admin Section */
        .admin-modal {
            background: white;
            padding: 32px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow);
            z-index: 210;
        }

        .admin-modal h2 {
            margin-bottom: 24px;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--primary);
        }

        #uploadOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(79, 70, 229, 0.1);
            border: 4px dashed var(--primary);
            z-index: 300;
            pointer-events: none;
            align-items: center;
            justify-content: center;
        }

        .upload-msg {
            background: white;
            padding: 24px 48px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            font-weight: 600;
            color: var(--primary);
        }

        /* Custom Dialog Modals */
        .dialog-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(4px);
            z-index: 500;
            align-items: center;
            justify-content: center;
        }

        .dialog-box {
            background: #fff;
            width: 100%;
            max-width: 400px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            padding: 24px;
            animation: slideUp 0.2s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .dialog-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .dialog-message {
            font-size: 0.9375rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .dialog-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9375rem;
            outline: none;
        }

        .dialog-input:focus {
            border-color: var(--primary);
        }

        .dialog-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        /* Selection Toolbar */
        .selection-toolbar {
            height: 56px;
            background: #fff;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background: #f8fafc;
        }

        .selection-info {
            font-size: 0.875rem;
            font-weight: 600;
        }

        .selection-actions {
            display: flex;
            gap: 8px;
        }

        .grid-item.selected {
            border-color: var(--primary);
            background-color: #eef2ff;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            aside {
                position: fixed;
                height: 100vh;
                transform: translateX(-100%);
            }
            body.sidebar-collapsed aside {
                margin-left: 0;
            }
            aside.active {
                transform: translateX(0);
            }
            #sidebar-overlay.active {
                display: block;
            }
            .header-right .btn span {
                display: none;
            }
            .header-right .btn {
                padding: 8px;
            }
            .view-toggle {
                display: none;
            }
            .zoom-slider-container {
                display: none;
            }
            #content {
                padding: 16px;
            }
            .grid-view {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 12px;
            }
        }

        #menu-toggle {
            display: flex !important;
        }

        /* 비디오 플레이어 컨테이너 크기 고정 */
        .artplayer-app {
            width: 100%;
            height: 100%;
            max-height: 100%;
        }

        /* 1. 자막 강제 가시성 확보 및 하단 위치 고정 */
        .artplayer-app .art-subtitle {
            bottom: 50px !important; /* 재생바가 사라져도 위치를 유지하도록 고정 */
            z-index: 20 !important;  /* 컨트롤바(보통 10~15)보다 높게 설정하거나 명확히 구분 */
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.9); /* 가독성 강화 */
        }

        /* 2. 컨트롤 바가 사라질 때 자막 위치 급변 방지 */
        .artplayer-app.art-hide-control .art-subtitle {
            bottom: 20px !important; /* 재생바가 숨겨졌을 때 살짝 아래로 내려가되 사라지지 않게 함 */
        }

        /* 이미지 프리뷰도 꽉 차게 조절 */
        .preview-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)">
    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
    <aside id="sidebar">
        <div class="logo" onclick="location.reload()" style="cursor:pointer">
            <i data-lucide="hard-drive"></i>
            <span>LiteDrive</span>
        </div>
        
        <nav class="nav-group">
            <div class="nav-label">Library</div>
            <a onclick="setCategory('all')" class="nav-item active" id="nav-all">
                <i data-lucide="files"></i>
                <span>All Files</span>
            </a>
            <a onclick="setCategory('photos')" class="nav-item" id="nav-photos">
                <i data-lucide="image"></i>
                <span>Photos</span>
            </a>
            <a onclick="setCategory('videos')" class="nav-item" id="nav-videos">
                <i data-lucide="play-circle"></i>
                <span>Videos</span>
            </a>
            <a onclick="setCategory('docs')" class="nav-item" id="nav-docs">
                <i data-lucide="file-text"></i>
                <span>Documents</span>
            </a>
        </nav>

        <nav class="nav-group" style="margin-top: auto;">
            <div class="nav-label">System</div>
            <a onclick="showAdminModal()" class="nav-item" id="nav-admin">
                <i data-lucide="shield-check"></i>
                <span>Admin Login</span>
            </a>
            <a onclick="logoutAdmin()" class="nav-item" id="nav-logout" style="display: none; color: #f87171;">
                <i data-lucide="log-out"></i>
                <span>Admin Logout</span>
            </a>
            <div id="admin-info" style="display: none; padding: 12px; font-size: 0.8rem; color: #94a3b8;">
                <i data-lucide="user" style="width: 14px; margin-right: 4px;"></i> Admin Mode Active
            </div>
        </nav>
    </aside>

    <main>
        <header>
            <div class="header-left">
                <div id="menu-toggle" onclick="toggleSidebar()">
                    <i data-lucide="menu"></i>
                </div>
                <div class="search-box">
                    <i data-lucide="search" class="icon"></i>
                    <input type="text" placeholder="Search files..." oninput="handleSearch(this.value)" autocomplete="off" spellcheck="false">
                </div>
            </div>
            <div class="header-right">
                <div class="zoom-slider-container" id="zoom-container">
                    <i data-lucide="minus" style="width: 14px;"></i>
                    <input type="range" id="zoom-slider" min="120" max="300" value="180" oninput="updateGridSize(this.value)">
                    <i data-lucide="plus" style="width: 14px;"></i>
                </div>
                <div class="view-toggle">
                    <div class="toggle-btn" id="btn-list" onclick="setViewMode('list')" title="List View">
                        <i data-lucide="list"></i>
                    </div>
                    <div class="toggle-btn active" id="btn-grid" onclick="setViewMode('grid')" title="Grid View">
                        <i data-lucide="layout-grid"></i>
                    </div>
                </div>
                <button class="btn" id="mkdirBtn" onclick="createFolder()" style="display: none;">
                    <i data-lucide="folder-plus"></i>
                    <span>New Folder</span>
                </button>
                <button class="btn btn-primary" id="uploadBtn" onclick="triggerUpload()" style="display: none;">
                    <i data-lucide="upload-cloud"></i>
                    <span>Upload</span>
                </button>
            </div>
        </header>

        <div id="selection-toolbar" class="selection-toolbar" style="display: none;">
            <div class="selection-info">
                <span id="selected-count">0</span> items selected
            </div>
            <div class="selection-actions">
                <button id="preview-btn" class="btn btn-primary" onclick="previewSelectedItem()">
                    <i data-lucide="eye"></i> Preview
                </button>
                <button class="btn" onclick="downloadSelectedItem()">
                    <i data-lucide="download"></i> Download
                </button>
                <button class="btn" onclick="renameSelectedItem()">
                    <i data-lucide="edit-3"></i> Rename
                </button>
                <button class="btn" onclick="deleteSelectedItem()" style="color: #ef4444;">
                    <i data-lucide="trash-2"></i> Delete
                </button>
                <button class="btn" onclick="clearSelection()">Cancel</button>
            </div>
        </div>

        <div id="content" onclick="deselectAll(event)">
            <div class="breadcrumb" id="breadcrumb">
                <!-- Dynamic -->
            </div>
            <div id="file-container">
                <!-- Files render here -->
            </div>
        </div>

        <div id="status-bar" style="height: 24px; background: #fff; border-top: 1px solid var(--border-color); display: flex; align-items: center; padding: 0 24px; font-size: 0.7rem; color: var(--text-muted);">
            <div id="status-dot" style="width: 8px; height: 8px; border-radius: 50%; background: #ccc; margin-right: 8px;"></div>
            <span id="status-text">Connecting...</span>
        </div>
    </main>

    <!-- Modals -->
    <div id="previewModal" class="modal">
        <div class="modal-content">
            <div class="preview-main">
                <div id="preview-container" style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;"></div>
            </div>
            <div class="preview-sidebar" id="previewSidebar">
                <!-- Sidebar content dynamic -->
            </div>
        </div>
        <div class="close-modal" onclick="closePreview()">
            <i data-lucide="x"></i>
        </div>
    </div>

    <div id="adminModal" class="modal" style="display: none; align-items: center; justify-content: center;">
        <div class="admin-modal">
            <h2>Admin Login</h2>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="adminPassword" placeholder="Enter admin password">
            </div>
            <div style="display: flex; gap: 8px; justify-content: flex-end;">
                <button class="btn" onclick="hideAdminModal()">Cancel</button>
                <button class="btn btn-primary" onclick="loginAdmin()">Login</button>
            </div>
        </div>
    </div>

    <div id="uploadOverlay">
        <div class="upload-msg">Drop files to upload</div>
    </div>

    <div id="dialogOverlay" class="dialog-overlay">
        <div class="dialog-box">
            <div id="dialogTitle" class="dialog-title">Title</div>
            <div id="dialogMessage" class="dialog-message">Message</div>
            <input type="text" id="dialogInput" class="dialog-input" style="display: none;">
            <div class="dialog-footer">
                <button id="dialogCancel" class="btn">Cancel</button>
                <button id="dialogConfirm" class="btn btn-primary">Confirm</button>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" style="display: none;" onchange="handleFileSelect(event)">

    <script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
    <script>
        let currentPath = '';
        let adminPassword = '';
        let art = null;
        let viewMode = 'grid';
        let currentCategory = 'all';
        let allItems = [];
        let selectedItem = null;

        function deselectAll(e) {
            if (e.target.closest('.grid-item') || e.target.closest('.list-view table')) return;
            clearSelection();
        }

        function clearSelection() {
            selectedItem = null;
            document.querySelectorAll('.grid-item, .list-view tr').forEach(el => el.classList.remove('selected'));
            document.getElementById('selection-toolbar').style.display = 'none';
        }

        function toggleSelection(e, path, isDir, ext) {
            e.stopPropagation();
            clearSelection();
            selectedItem = { path, isDir, ext };
            e.currentTarget.classList.add('selected');
            document.getElementById('selected-count').innerText = '1';
            
            const isPreviewable = !isDir && ['.png', '.jpg', '.jpeg', '.gif', '.mp4', '.mkv', '.webm', '.pdf', '.txt', '.vtt', '.srt'].includes(ext);
            document.getElementById('preview-btn').style.display = isPreviewable ? 'flex' : 'none';
            
            document.getElementById('selection-toolbar').style.display = 'flex';
        }

        async function downloadSelectedItem() {
            if (selectedItem) {
                downloadFile(selectedItem.path);
                clearSelection();
            }
        }

        async function deleteSelectedItem() {
            if (selectedItem) await deleteItem(selectedItem.path);
        }

        // Custom Dialog Utility
        function showDialog({ type = 'alert', title = '', message = '', placeholder = '', value = '' }) {
            return new Promise((resolve) => {
                const overlay = document.getElementById('dialogOverlay');
                const titleEl = document.getElementById('dialogTitle');
                const messageEl = document.getElementById('dialogMessage');
                const inputEl = document.getElementById('dialogInput');
                const cancelBtn = document.getElementById('dialogCancel');
                const confirmBtn = document.getElementById('dialogConfirm');

                titleEl.innerText = title;
                messageEl.innerText = message;
                inputEl.value = value;
                inputEl.placeholder = placeholder;
                inputEl.style.display = type === 'prompt' ? 'block' : 'none';
                cancelBtn.style.display = type === 'alert' ? 'none' : 'block';
                overlay.style.display = 'flex';

                if (type === 'prompt') setTimeout(() => inputEl.focus(), 50);

                const cleanup = (val) => {
                    overlay.style.display = 'none';
                    confirmBtn.onclick = null;
                    cancelBtn.onclick = null;
                    inputEl.onkeydown = null;
                    resolve(val);
                };

                confirmBtn.onclick = () => cleanup(type === 'prompt' ? inputEl.value : true);
                cancelBtn.onclick = () => cleanup(null);
                inputEl.onkeydown = (e) => {
                    if (e.key === 'Enter') confirmBtn.click();
                    if (e.key === 'Escape') cancelBtn.click();
                };
            });
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            const isMobile = window.innerWidth <= 768;

            if (isMobile) {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active');
            } else {
                document.body.classList.toggle('sidebar-collapsed');
            }
        }

        function updateGridSize(val) {
            document.documentElement.style.setProperty('--grid-size', val + 'px');
        }

        async function loginAdmin() {
            const pass = document.getElementById('adminPassword').value;
            if (!pass) return;
            adminPassword = pass;
            
            if (await validateAndSetAdminUI()) {
                localStorage.setItem('adminPassword', adminPassword);
                hideAdminModal();
            } else {
                alert('Invalid password');
                adminPassword = '';
            }
        }

        async function validateAndSetAdminUI() {
            try {
                const res = await fetch('/api/upload', {
                    method: 'POST',
                    headers: { 'x-admin-password': adminPassword },
                    body: new FormData() 
                });
                if (res.status !== 401) {
                    document.getElementById('uploadBtn').style.display = 'flex';
                    document.getElementById('mkdirBtn').style.display = 'flex';
                    document.getElementById('admin-info').style.display = 'block';
                    document.getElementById('nav-admin').style.display = 'none';
                    document.getElementById('nav-logout').style.display = 'flex';
                    lucide.createIcons();
                    return true;
                }
                return false;
            } catch (e) {
                console.error(e);
                return false;
            }
        }

        function logoutAdmin() {
            adminPassword = '';
            localStorage.removeItem('adminPassword');
            document.getElementById('uploadBtn').style.display = 'none';
            document.getElementById('mkdirBtn').style.display = 'none';
            document.getElementById('admin-info').style.display = 'none';
            document.getElementById('nav-admin').style.display = 'flex';
            document.getElementById('nav-logout').style.display = 'none';
            alert('Logged out successfully');
            lucide.createIcons();
        }

        async function createFolder() {
            const folderName = await showDialog({ type: 'prompt', title: 'New Folder', message: 'Enter folder name:', placeholder: 'Folder name' });
            if (!folderName) return;

            try {
                const response = await fetch('/api/mkdir', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'x-admin-password': adminPassword 
                    },
                    body: JSON.stringify({ path: currentPath, name: folderName })
                });
                const data = await response.json();
                if (data.error) await showDialog({ title: 'Error', message: data.error });
                else fetchFiles(currentPath);
            } catch (err) {
                console.error('Failed to create folder', err);
            }
        }

        function showAdminModal() { document.getElementById('adminModal').style.display = 'flex'; }
        function hideAdminModal() { document.getElementById('adminModal').style.display = 'none'; }
        
        function setViewMode(mode) {
            viewMode = mode;
            document.getElementById('btn-list').classList.toggle('active', mode === 'list');
            document.getElementById('btn-grid').classList.toggle('active', mode === 'grid');
            document.getElementById('zoom-container').style.display = mode === 'grid' ? 'flex' : 'none';
            applyFilters();
        }

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('nav-' + cat).classList.add('active');
            applyFilters();
        }

        function handleSearch(query) {
            searchQuery = query.toLowerCase();
            applyFilters();
        }

        function applyFilters() {
            let filtered = allItems;
            if (currentCategory === 'photos') {
                filtered = allItems.filter(i => i.isDirectory || ['.jpg', '.jpeg', '.png', '.gif', '.webp'].includes(i.ext));
            } else if (currentCategory === 'videos') {
                filtered = allItems.filter(i => i.isDirectory || ['.mp4', '.mkv', '.webm', '.mov'].includes(i.ext));
            } else if (currentCategory === 'docs') {
                filtered = allItems.filter(i => i.isDirectory || ['.pdf', '.txt', '.doc', '.docx'].includes(i.ext));
            }
            if (searchQuery) {
                filtered = filtered.filter(i => i.name.toLowerCase().includes(searchQuery));
            }
            renderFiles(filtered);
        }

        async function fetchFiles(path = '') {
            searchQuery = '';
            currentCategory = 'all';
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('nav-all').classList.add('active');
            const searchInput = document.querySelector('.search-box input');
            if (searchInput) searchInput.value = '';

            try {
                const response = await fetch(`/api/files?path=${encodeURIComponent(path)}`);
                const data = await response.json();
                if (data.error) return;
                currentPath = data.currentPath;
                allItems = data.items;
                renderBreadcrumb();
                applyFilters();
            } catch (err) {
                console.error('Failed to fetch files', err);
            }
        }

        function renderBreadcrumb() {
            const container = document.getElementById('breadcrumb');
            const parts = currentPath.split('/').filter(p => p);
            let html = '<span onclick="fetchFiles(\'\')"><i data-lucide="home" style="width:16px;vertical-align:middle;"></i> Root</span>';
            let pathAcc = '';
            parts.forEach((part, index) => {
                pathAcc += (index === 0 ? '' : '/') + part;
                const currentAcc = pathAcc;
                html += ` <i data-lucide="chevron-right" style="width:14px;vertical-align:middle;"></i> <span onclick="fetchFiles('${currentAcc}')">${part}</span>`;
            });
            container.innerHTML = html;
            lucide.createIcons();
        }

        function renderFiles(items) {
            const container = document.getElementById('file-container');
            container.innerHTML = '';
            if (viewMode === 'list') renderListView(items, container);
            else renderGridView(items, container);
            lucide.createIcons();
        }

        function renderListView(items, container) {
            const div = document.createElement('div');
            div.className = 'list-view';
            let html = `<table><thead><tr><th>Name</th><th>Size</th><th>Modified</th></tr></thead><tbody>`;
            if (currentPath !== '') {
                const parentPath = currentPath.split('/').slice(0, -1).join('/');
                html += `<tr onclick="fetchFiles('${parentPath}')" style="cursor:pointer"><td colspan="3"><i data-lucide="corner-left-up" style="width:18px;margin-right:8px;"></i> .. (Parent)</td></tr>`;
            }
            items.forEach(item => {
                const icon = getItemIcon(item);
                const size = item.isDirectory ? '-' : formatSize(item.size);
                const date = new Date(item.mtime).toLocaleDateString();
                const itemFullPath = currentPath ? `${currentPath}/${item.name}` : item.name;
                html += `<tr onclick="handleItemClick('${itemFullPath}', ${item.isDirectory}, '${item.ext}')" style="cursor:pointer">
                    <td><i data-lucide="${icon}" style="width:18px;margin-right:12px;color:var(--primary)"></i> ${item.name}</td>
                    <td>${size}</td><td>${date}</td></tr>`;
            });
            html += `</tbody></table>`;
            div.innerHTML = html;
            container.appendChild(div);
        }

        function renderGridView(items, container) {
            const div = document.createElement('div');
            div.className = 'grid-view';
            if (currentPath !== '') {
                const parentPath = currentPath.split('/').slice(0, -1).join('/');
                const parentCard = document.createElement('div');
                parentCard.className = 'grid-item';
                parentCard.onclick = () => fetchFiles(parentPath);
                parentCard.innerHTML = `<div class="file-icon"><i data-lucide="corner-left-up"></i></div><div class="file-name">.. (Parent)</div>`;
                div.appendChild(parentCard);
            }
            items.forEach(item => {
                const isImage = !item.isDirectory && ['.jpg', '.jpeg', '.png', '.gif', '.webp'].includes(item.ext);
                const size = item.isDirectory ? 'Folder' : formatSize(item.size);
                const itemFullPath = currentPath ? `${currentPath}/${item.name}` : item.name;
                const card = document.createElement('div');
                card.className = 'grid-item';
                card.onclick = (e) => toggleSelection(e, itemFullPath, item.isDirectory, item.ext);
                card.ondblclick = () => handleItemClick(itemFullPath, item.isDirectory, item.ext);
                
                let iconHtml = '';
                if (isImage) {
                    iconHtml = `<img src="/api/view?path=${encodeURIComponent(itemFullPath)}" loading="lazy" alt="${item.name}">`;
                } else {
                    iconHtml = `<i data-lucide="${getItemIcon(item)}"></i>`;
                }

                card.innerHTML = `<div class="file-icon">${iconHtml}</div><div class="file-name" title="${item.name}">${item.name}</div><div class="file-info">${size}</div>`;
                div.appendChild(card);
            });
            container.appendChild(div);
        }

        function getItemIcon(item) {
            if (item.isDirectory) return 'folder';
            if (['.jpg', '.jpeg', '.png', '.gif', '.webp'].includes(item.ext)) return 'image';
            if (['.mp4', '.mkv', '.webm', '.mov'].includes(item.ext)) return 'video';
            if (item.ext === '.pdf') return 'file-text';
            if (item.ext === '.txt') return 'file-type';
            return 'file';
        }

        function handleItemClick(path, isDir, ext) {
            if (isDir) fetchFiles(path);
            else {
                const isPreviewable = ['.png', '.jpg', '.jpeg', '.gif', '.mp4', '.mkv', '.webm', '.pdf', '.txt', '.vtt', '.srt'].includes(ext);
                if (isPreviewable) openPreview(path, ext);
                else downloadFile(path);
            }
        }

        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        function downloadFile(path) { window.location.href = `/api/download?path=${encodeURIComponent(path)}`; }
        function triggerUpload() { document.getElementById('fileInput').click(); }
        async function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) uploadFile(file);
        }

        async function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);
            try {
                const response = await fetch(`/api/upload?path=${encodeURIComponent(currentPath)}`, {
                    method: 'POST',
                    headers: { 'x-admin-password': adminPassword },
                    body: formData
                });
                const data = await response.json();
                if (data.error) await showDialog({ title: 'Error', message: data.error });
                else fetchFiles(currentPath);
            } catch (err) { console.error('Upload failed', err); }
        }

        async function previewSelectedItem() {
            if (selectedItem) {
                openPreview(selectedItem.path, selectedItem.ext);
                clearSelection();
            }
        }

        function handleDragOver(e) { e.preventDefault(); if (adminPassword) document.getElementById('uploadOverlay').style.display = 'flex'; }
        function handleDragLeave(e) { document.getElementById('uploadOverlay').style.display = 'none'; }
        function handleDrop(e) {
            e.preventDefault();
            document.getElementById('uploadOverlay').style.display = 'none';
            if (!adminPassword) return;
            const files = e.dataTransfer.files;
            if (files.length > 0) uploadFile(files[0]);
        }

        async function openPreview(path, ext) {
            const modal = document.getElementById('previewModal');
            const container = document.getElementById('preview-container');
            const sidebar = document.getElementById('previewSidebar');
            
            // 1. 기존 인스턴스 파괴 (찌꺼기 방지)
            container.innerHTML = ''; 
            if (art) {
                art.destroy();
                art = null;
            }

            const fileName = path.split('/').pop();
            const viewUrl = `/api/view?path=${encodeURIComponent(path)}`;

            // 2. 사이드바 구성
            let sidebarHtml = `
                <div class="sidebar-header">
                    <h3>${fileName}</h3>
                    <p>${ext.toUpperCase()} File</p>
                </div>
                <div class="action-group">
                    <button class="btn" onclick="downloadFile('${path}')">
                        <i data-lucide="download"></i> <span>Download</span>
                    </button>
            `;

            if (adminPassword) {
                sidebarHtml += `
                    <div style="margin: 20px 0; border-top: 1px solid var(--border-color); padding-top: 20px;">
                        <p style="font-size: 0.75rem; font-weight: 600; color: var(--text-muted); margin-bottom: 12px; text-transform: uppercase;">Admin Tools</p>
                        <div class="action-group">
                            <button class="btn" onclick="renameItem('${path}')"><i data-lucide="edit-3"></i><span>Rename</span></button>
                            <button class="btn" onclick="deleteItem('${path}')" style="color: #ef4444; border-color: #fecaca;"><i data-lucide="trash-2"></i><span>Delete</span></button>
                        </div>
                    </div>
                `;
            }
            sidebarHtml += `</div>`;
            sidebar.innerHTML = sidebarHtml;

            // 3. 파일 타입별 렌더링
            try {
                if (['.mp4', '.mkv', '.webm', '.mov'].includes(ext)) {
                    container.innerHTML = `<div class="artplayer-app" style="width:100%; height:100%;"></div>`;
                    
                    const infoRes = await fetch(`/api/media-info?path=${encodeURIComponent(path)}`);
                    const info = await infoRes.json();
                    const streams = info.streams || [];

                    const subtitleTracks = streams
                        .filter(s => s.type === 'subtitle')
                        .map(s => ({
                            html: `[자막 ${s.index}] ${s.title || 'Subtitle'} (${s.language || 'und'})`,
                            url: `/api/subtitle?path=${encodeURIComponent(path)}&index=${s.index}`,
                            name: `sub_${s.index}`
                        }));

                    const audioTracks = streams
                        .filter(s => s.type.toLowerCase() === 'audio')
                        .map(s => ({
                            html: `[오디오 ${s.index}] ${s.title || 'Audio'} (${s.language || 'und'})`,
                            index: s.index,
                            name: `aud_${s.index}`
                        }));

                    // Artplayer 초기화
                    art = new Artplayer({
                        container: '.artplayer-app',
                        url: viewUrl,
                        type: 'mp4',
                        title: fileName,
                        autoplay: true,
                        setting: true,
                        playbackRate: true,
                        aspectRatio: true,
                        pip: true,
                        fullscreen: true,
                        fullscreenWeb: true,
                        theme: '#4f46e5',
                        lastSeen: true, // 요걸 꼭 true로 해줘야 함! 💡
                        storage: true, // 로컬 스토리지에 재생 기록 저장 필수
                        subtitle: subtitleTracks.length > 0 ? {
                            url: subtitleTracks[0].url,
                            type: 'srt',
                            encoding: 'utf-8',
                            style: {
                                color: '#ffffff',
                                fontSize: '32px',
                                textShadow: '0 0 4px rgba(0, 0, 0, 0.8)',
                            },
                        } : {},
                        settings: [
                            {
                                width: 250,
                                html: '자막',
                                tooltip: subtitleTracks.length > 0 ? '선택 가능' : '없음',
                                selector: [{ html: '자막 끄기', url: '' }, ...subtitleTracks],
                                onSelect: function (item) {
                                    if (item.url) art.subtitle.switch(item.url, { name: item.name, type: 'srt' });
                                    else art.subtitle.show = false;
                                    return item.html;
                                },
                            },
                            {
                                html: '자막 크기',
                                width: 250,
                                selector: [
                                    {
                                        default: false,
                                        html: '작음',
                                        fontSize: '24px',
                                    },
                                    {
                                        default: true,
                                        html: '중간',
                                        fontSize: '32px',
                                    },
                                    {
                                        default: false,
                                        html: '큼',
                                        fontSize: '48px',
                                    },
                                ],
                                onSelect: function (item){
                                                        // 자막 스타일 업데이트
                                    art.subtitle.style({
                                        fontSize: item.fontSize,
                                    });
                                    return item.html;
                                },

                            },
                            {
                                width: 250,
                                html: '오디오 트랙',
                                tooltip: audioTracks.length > 0 ? '선택 가능' : '기본',
                                selector: audioTracks,
                                onSelect: function (item) {
                                    const currentTime = art.currentTime;
                                    // 서버에 현재 시간을 전달해서 거기서부터 렌더링하도록 요청
                                    const newUrl = `/api/view?path=${encodeURIComponent(path)}&audio_index=${item.index}&start=${currentTime}&_v=${Date.now()}`;
                                    
                                    art.notice.show = '오디오 트랙 변경 중... ⏳';
                                    
                                    // switchUrl로 깔끔하게 전환
                                    art.switchUrl(newUrl).then(() => {
                                        art.play();
                                    });
                                    
                                    return item.html;
                                },
                            },
                        ],
                    });
                } else if (['.png', '.jpg', '.jpeg', '.gif', '.webp'].includes(ext)) {
                    container.innerHTML = `<img src="${viewUrl}" class="preview-img" style="max-width:100%; max-height:100%; object-fit:contain;">`;
                } else if (ext === '.pdf' || ext === '.txt') {
                    container.innerHTML = `<iframe src="${viewUrl}" style="width:100%; height:100%; border:none; background:white; border-radius:12px;"></iframe>`;
                }
            } catch (err) {
                console.error("미디어 렌더링 오류:", err);
                container.innerHTML = `<video src="${viewUrl}" controls autoplay style="width:100%; max-height:100%;"></video>`;
            }

            modal.style.display = 'block';
            lucide.createIcons();
        }

        async function renameItem(path) {
            const oldName = path.split('/').pop();
            const newName = await showDialog({ type: 'prompt', title: 'Rename', message: 'Enter new name:', value: oldName });
            if (!newName || newName === oldName) return;

            try {
                const res = await fetch('/api/rename', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-admin-password': adminPassword },
                    body: JSON.stringify({ path, newName })
                });
                const data = await res.json();
                if (data.error) await showDialog({ title: 'Error', message: data.error });
                else {
                    closePreview();
                    fetchFiles(currentPath);
                }
            } catch (err) { console.error(err); }
        }

        // 선택된 아이템의 이름을 변경하는 브릿지 함수
        async function renameSelectedItem() {
            if (selectedItem) {
                await renameItem(selectedItem.path);
                clearSelection(); // 작업 완료 후 선택 해제
            }
        }

        async function deleteItem(path) {
            const confirm = await showDialog({ type: 'confirm', title: 'Delete Item', message: 'Are you sure you want to delete this item?' });
            if (!confirm) return;

            try {
                const res = await fetch('/api/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-admin-password': adminPassword },
                    body: JSON.stringify({ path })
                });
                const data = await res.json();
                if (data.error) await showDialog({ title: 'Error', message: data.error });
                else {
                    closePreview();
                    fetchFiles(currentPath);
                }
            } catch (err) { console.error(err); }
        }

        function closePreview() {
            const modal = document.getElementById('previewModal');
            if (art) { art.destroy(); art = null; }
            modal.style.display = 'none';
        }

        fetchFiles();
        fetch('/api/status').then(r => r.json()).then(d => {
            document.getElementById('status-text').innerText = 'Online';
            document.getElementById('status-dot').style.background = '#10b981';
        }).catch(e => {
            document.getElementById('status-text').innerText = 'Offline';
            document.getElementById('status-dot').style.background = '#ef4444';
        });
    </script>
</body>
</html>
