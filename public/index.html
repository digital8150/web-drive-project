<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiteDrive - File Explorer</title>
    <style>
        :root {
            --primary-color: #3498db;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --card-bg: #fff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .admin-controls {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .admin-controls input[type="password"] {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .admin-controls button {
            padding: 8px 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .admin-controls button:hover {
            background-color: #2980b9;
        }
        .upload-section {
            display: none;
            margin-top: 10px;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
        .breadcrumb {
            margin-bottom: 15px;
            font-size: 0.9em;
            color: #666;
        }
        .breadcrumb span {
            cursor: pointer;
            color: var(--primary-color);
        }
        .file-list {
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background-color: #fafafa;
            font-weight: 600;
        }
        tr:hover {
            background-color: #f9f9f9;
        }
        .icon {
            margin-right: 10px;
            width: 20px;
            text-align: center;
            display: inline-block;
        }
        .item-name {
            cursor: pointer;
            color: var(--text-color);
            text-decoration: none;
        }
        .item-name:hover {
            color: var(--primary-color);
        }
        .actions button {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--primary-color);
            font-size: 0.9em;
            margin-right: 5px;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
        }
        .modal-content {
            position: relative;
            margin: auto;
            top: 50%;
            transform: translateY(-50%);
            max-width: 90%;
            max-height: 90%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .modal-content img, .modal-content video {
            max-width: 100%;
            max-height: 80vh;
        }
        .modal-content iframe {
            width: 80vw;
            height: 80vh;
            border: none;
            background: white;
        }
        .artplayer-app {
            width: 80vw;
            height: 60vh;
            max-width: 1000px;
        }
        .close-modal {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 30px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📂 LiteDrive</h1>
            <div id="status">Connecting...</div>
        </header>

        <div class="admin-controls">
            <input type="password" id="adminPassword" placeholder="Admin Password">
            <button onclick="loginAdmin()">Login</button>
            <div id="uploadSection" class="upload-section">
                <input type="file" id="fileInput">
                <button onclick="uploadFile()">Upload</button>
            </div>
        </div>

        <div class="breadcrumb" id="breadcrumb">
            Root
        </div>

        <div class="file-list">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Size</th>
                        <th>Modified</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="file-table-body">
                    <!-- Files will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>

    <div id="previewModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closePreview()">&times;</span>
            <div id="preview-container"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
    <script>
        let currentPath = '';
        let adminPassword = '';
        let art = null;

        function loginAdmin() {
            const pass = document.getElementById('adminPassword').value;
            if (!pass) return alert('Enter password');
            adminPassword = pass;
            document.getElementById('uploadSection').style.display = 'block';
            alert('Admin mode enabled (Password stored in memory)');
        }

        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            if (fileInput.files.length === 0) return alert('Select a file');

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('path', currentPath);

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    headers: {
                        'x-admin-password': adminPassword
                    },
                    body: formData
                });

                const data = await response.json();
                if (data.error) {
                    alert(data.error);
                } else {
                    alert('Upload successful');
                    fetchFiles(currentPath);
                }
            } catch (err) {
                console.error('Upload failed', err);
                alert('Upload failed');
            }
        }

        async function fetchFiles(path = '') {
            try {
                const response = await fetch(`/api/files?path=${encodeURIComponent(path)}`);
                const data = await response.json();
                if (data.error) {
                    alert(data.error);
                    return;
                }
                currentPath = data.currentPath;
                renderBreadcrumb();
                renderFiles(data.items);
            } catch (err) {
                console.error('Failed to fetch files', err);
            }
        }

        function renderBreadcrumb() {
            const container = document.getElementById('breadcrumb');
            const parts = currentPath.split('/').filter(p => p);
            let html = '<span onclick="fetchFiles(\'\')">Root</span>';
            let pathAcc = '';
            parts.forEach((part, index) => {
                pathAcc += (index === 0 ? '' : '/') + part;
                const currentAcc = pathAcc;
                html += ` / <span onclick="fetchFiles('${currentAcc}')">${part}</span>`;
            });
            container.innerHTML = html;
        }

        function renderFiles(items) {
            const tbody = document.getElementById('file-table-body');
            tbody.innerHTML = '';

            if (currentPath !== '') {
                const parentPath = currentPath.split('/').slice(0, -1).join('/');
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td colspan="4">
                        <span class="icon">⤴️</span>
                        <a href="#" class="item-name" onclick="fetchFiles('${parentPath}')">.. (Parent Directory)</a>
                    </td>
                `;
                tbody.appendChild(tr);
            }

            items.forEach(item => {
                const tr = document.createElement('tr');
                const icon = item.isDirectory ? '📁' : '📄';
                const size = item.isDirectory ? '-' : formatSize(item.size);
                const date = new Date(item.mtime).toLocaleString();
                const itemFullPath = currentPath ? `${currentPath}/${item.name}` : item.name;

                const isPreviewable = !item.isDirectory && ['.png', '.jpg', '.jpeg', '.gif', '.mp4', '.mkv', '.webm', '.pdf', '.txt'].includes(item.ext);

                tr.innerHTML = `
                    <td>
                        <span class="icon">${icon}</span>
                        <a href="#" class="item-name" onclick="${item.isDirectory ? `fetchFiles('${itemFullPath}')` : (isPreviewable ? `openPreview('${itemFullPath}', '${item.ext}')` : `downloadFile('${itemFullPath}')`)}">${item.name}</a>
                    </td>
                    <td>${size}</td>
                    <td>${date}</td>
                    <td class="actions">
                        ${isPreviewable ? `<button onclick="openPreview('${itemFullPath}', '${item.ext}')">View</button>` : ''}
                        ${item.isDirectory ? '' : `<button onclick="downloadFile('${itemFullPath}')">Download</button>`}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function downloadFile(path) {
            window.location.href = `/api/download?path=${encodeURIComponent(path)}`;
        }

        async function openPreview(path, ext) {
            const modal = document.getElementById('previewModal');
            const container = document.getElementById('preview-container');
            container.innerHTML = '';
            
            const viewUrl = `/api/view?path=${encodeURIComponent(path)}`;

            if (['.png', '.jpg', '.jpeg', '.gif'].includes(ext)) {
                container.innerHTML = `<img src="${viewUrl}" alt="Preview">`;
            } else if (['.mp4', '.mkv', '.webm'].includes(ext)) {
                container.innerHTML = `<div class="artplayer-app"></div>`;
                
                try {
                    const infoRes = await fetch(`/api/media-info?path=${encodeURIComponent(path)}`);
                    const info = await infoRes.json();
                    
                    const subtitleTracks = info.streams
                        .filter(s => s.type === 'subtitle')
                        .map(s => ({
                            html: s.title || `Subtitle ${s.index} (${s.language})`,
                            url: `/api/subtitle?path=${encodeURIComponent(path)}&index=${s.index}`,
                            name: s.title || `Subtitle ${s.index}`
                        }));

                    art = new Artplayer({
                        container: '.artplayer-app',
                        url: viewUrl,
                        type: ext === '.mkv' ? 'mkv' : (ext === '.mp4' ? 'mp4' : 'webm'),
                        title: path.split('/').pop(),
                        autoplay: true,
                        pip: true,
                        screenshot: true,
                        setting: true,
                        loop: true,
                        flip: true,
                        playbackRate: true,
                        aspectRatio: true,
                        fullscreen: true,
                        fullscreenWeb: true,
                        subtitleOffset: true,
                        miniProgressBar: true,
                        mutex: true,
                        backdrop: true,
                        playsInline: true,
                        autoPlayback: true,
                        airplay: true,
                        subtitle: subtitleTracks.length > 0 ? {
                            url: subtitleTracks[0].url,
                            type: 'srt',
                            style: {
                                color: '#fff',
                                fontSize: '20px',
                            },
                            encoding: 'utf-8',
                        } : {},
                        settings: [
                            {
                                width: 200,
                                html: 'Subtitles',
                                tooltip: subtitleTracks.length > 0 ? subtitleTracks[0].name : 'None',
                                selector: [
                                    {
                                        html: 'Off',
                                        url: '',
                                    },
                                    ...subtitleTracks
                                ],
                                onSelect: function (item) {
                                    if (item.url) {
                                        art.subtitle.switch(item.url, {
                                            name: item.name,
                                            type: 'srt',
                                        });
                                    } else {
                                        art.subtitle.show = false;
                                    }
                                    return item.html;
                                },
                            },
                        ],
                    });
                } catch (err) {
                    console.error('Failed to load media info', err);
                    container.innerHTML = `<video src="${viewUrl}" controls autoplay style="max-width:100%"></video>`;
                }
            } else if (ext === '.pdf' || ext === '.txt') {
                container.innerHTML = `<iframe src="${viewUrl}"></iframe>`;
            }

            modal.style.display = 'block';
        }

        function closePreview() {
            const modal = document.getElementById('previewModal');
            const container = document.getElementById('preview-container');
            if (art) {
                art.destroy();
                art = null;
            }
            container.innerHTML = ''; 
            modal.style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('previewModal');
            if (event.target == modal) {
                closePreview();
            }
        }

        // Initial load
        fetchFiles();
        
        // Status check
        fetch('/api/status')
            .then(r => r.json())
            .then(d => document.getElementById('status').innerText = 'Online')
            .catch(e => document.getElementById('status').innerText = 'Offline');
    </script>
</body>
</html>
